name: Monthly Data Update

on:
  schedule:
    - cron: '0 14 20 * *'  # 20th of each month at 9am ET (14:00 UTC)
  workflow_dispatch:         # allow manual trigger from GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run data update script
        run: python3 scripts/update-data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "data-bot"
          git config user.email "noreply@github.com"
          git add data/cities.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore: monthly data update $(date +'%Y-%m')"
            git push
            echo "Committed and pushed — Vercel will redeploy automatically"
          fi
